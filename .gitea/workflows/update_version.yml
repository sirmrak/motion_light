name: Update Version

on:
  push:
    branches:
      - main
      - master

env:
  GIT_SSL_NO_VERIFY: true

jobs:
  update-version:
    name: Update Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-semantic-release

      - name: Configure Git
        run: |
          git config --local user.email "actions@gitea.local"
          git config --local user.name "Gitea Actions Bot"

      - name: Disable SSL verification
        run: |
          SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
          cat > "$SITE_PACKAGES/sitecustomize.py" << 'PYEOF'
          import ssl
          ssl._create_default_https_context = ssl._create_unverified_context
          PYEOF

      - name: Debug - Show commits since last tag
        run: |
          echo "🔍 Коммиты после последнего тега:"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "Последний тег: $LAST_TAG"
          
          if [ "$LAST_TAG" != "none" ]; then
            git log ${LAST_TAG}..HEAD --oneline
          else
            echo "Тегов нет, показываем все коммиты:"
            git log --oneline
          fi
          
          echo ""
          echo "🔍 Текущая версия в manifest.json:"
          cat custom_components/motion_light/manifest.json | grep version

      - name: Run Semantic Release
        env:
          GITEA_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🚀 Запускаем semantic-release..."
          
          # Запускаем semantic-release
          # Он обновит manifest.json, создаст коммит и тег
          semantic-release version || {
            echo "⚠️  Semantic release завершился с ошибкой или не создал релиз"
            echo "Это нормально, если нет коммитов по Conventional Commits"
            exit 0
          }
          
          echo ""
          echo "🔍 Проверяем изменения:"
          git status
          
          echo ""
          echo "🔍 Новые теги:"
          git tag -l | tail -5
          
          echo ""
          echo "🔍 Версия в manifest.json:"
          cat custom_components/motion_light/manifest.json | grep version
          
          # Пушим изменения
          echo ""
          echo "📤 Пушим изменения в Gitea..."
          git push origin main || echo "⚠️  Push main failed (возможно, нет изменений)"
          git push origin --tags || echo "⚠️  Push tags failed (возможно, нет новых тегов)"
          
          echo "✅ Готово"